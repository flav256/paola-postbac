<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paola — Fit vs Chances de succes</title>
<style>
:root { --navy: #1a2e5a; --accent: #e8a838; --bg: #f5f7fb; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: #2c3e50; }
.container { max-width: 1100px; margin: 0 auto; padding: 20px; }
h1 { color: var(--navy); font-size: 1.5rem; margin-bottom: 4px; }
.subtitle { color: #7f8c8d; font-size: 0.85rem; margin-bottom: 16px; }
.back { display: inline-block; margin-bottom: 12px; color: #1565c0; text-decoration: none; font-size: 0.9rem; }

/* Legend */
.legend { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 14px; font-size: 0.82rem; align-items: center; }
.legend-item { display: flex; align-items: center; gap: 5px; cursor: pointer; padding: 4px 10px; border-radius: 16px; transition: all 0.2s; border: 2px solid transparent; }
.legend-item:hover, .legend-item.active { background: #f0f4ff; }
.legend-item.dimmed { opacity: 0.35; }
.legend-dot { width: 12px; height: 12px; border-radius: 50%; }

/* Filters */
.filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.filters button { padding: 5px 14px; border: 2px solid #ddd; border-radius: 20px; background: #fff; font-size: 0.78rem; cursor: pointer; font-weight: 600; transition: all 0.2s; }
.filters button.active { border-color: var(--navy); background: var(--navy); color: #fff; }
.filters button:hover:not(.active) { border-color: #aaa; }

/* Chart */
.chart-wrap { background: #fff; border-radius: 14px; padding: 24px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); border: 1px solid #e0e4ec; position: relative; }
canvas { display: block; }

/* Detail card (click) */
.detail-card { position: absolute; background: #fff; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.18); border: 1px solid #e0e4ec; padding: 18px; width: 300px; z-index: 20; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.detail-card.visible { opacity: 1; pointer-events: auto; }
.detail-card .dc-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.detail-card .dc-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.detail-card .dc-name { font-weight: 700; color: var(--navy); font-size: 1.05rem; }
.detail-card .dc-status { font-size: 0.75rem; font-weight: 700; padding: 2px 8px; border-radius: 10px; }
.detail-card .dc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 12px; font-size: 0.82rem; margin-bottom: 10px; }
.detail-card .dc-label { color: #7f8c8d; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.5px; }
.detail-card .dc-val { font-weight: 600; }
.detail-card .dc-detail { font-size: 0.8rem; color: #555; font-style: italic; border-top: 1px solid #eee; padding-top: 8px; }
.detail-card .dc-close { position: absolute; top: 8px; right: 12px; cursor: pointer; font-size: 1.1rem; color: #aaa; background: none; border: none; }
.detail-card .dc-close:hover { color: #333; }
.detail-card .dc-bar { height: 6px; border-radius: 3px; background: #eee; margin-top: 4px; overflow: hidden; }
.detail-card .dc-bar-fill { height: 100%; border-radius: 3px; }

/* Hover tooltip (mini) */
.mini-tip { position: absolute; background: rgba(26,46,90,0.92); color: #fff; padding: 6px 10px; border-radius: 6px; font-size: 0.78rem; pointer-events: none; opacity: 0; transition: opacity 0.12s; white-space: nowrap; z-index: 15; }

@media (max-width: 600px) { .detail-card { width: 260px; padding: 14px; } }
</style>
</head>
<body>
<div class="container">

<a href="bilan.html" class="back">&larr; Retour au bilan</a>
<h1>Fit Paola vs Chances de succes</h1>
<p class="subtitle">Chaque bulle = une ecole. Taille = frais annuels. Cliquer sur une bulle pour les details.</p>

<div class="legend" id="legend">
  <div class="legend-item active" data-status="admise" onclick="toggleStatus('admise',this)"><div class="legend-dot" style="background:#27ae60;"></div> Admise</div>
  <div class="legend-item active" data-status="oral" onclick="toggleStatus('oral',this)"><div class="legend-dot" style="background:#2980b9;"></div> Oral a venir</div>
  <div class="legend-item active" data-status="attente" onclick="toggleStatus('attente',this)"><div class="legend-dot" style="background:#f39c12;"></div> Attente resultats</div>
  <div class="legend-item active" data-status="refusee" onclick="toggleStatus('refusee',this)"><div class="legend-dot" style="background:#e74c3c;"></div> Non admissible</div>
</div>

<div class="filters">
  <button class="active" onclick="setFilter('all',this)">Toutes</button>
  <button onclick="setFilter('top',this)">Top fit (>80)</button>
  <button onclick="setFilter('realistic',this)">Realistes (proba >50%)</button>
  <button onclick="setFilter('ideal',this)">Zone ideale</button>
</div>

<div class="chart-wrap" id="chartWrap">
  <canvas id="chart"></canvas>
  <div class="mini-tip" id="miniTip"></div>
  <div class="detail-card" id="detailCard">
    <button class="dc-close" onclick="closeDetail()">&times;</button>
    <div id="dcContent"></div>
  </div>
</div>

</div>

<script>
const schools = [
  { name: 'HEC Montreal', fit: 78, proba: 100, fees: 8000, status: 'admise', program: 'BAA (annee prep)', lieu: 'Montreal, Canada', detail: 'Triple accreditee, top francophone Ameriques', accred: 'AACSB EQUIS AMBA', rank: '#1 francophone Canada' },
  { name: 'Concordia JMSB', fit: 58, proba: 100, fees: 9000, status: 'admise', program: 'BCom', lieu: 'Montreal, Canada', detail: 'Backup solide Montreal', accred: 'AACSB', rank: 'Top 10 Canada' },
  { name: 'EDHEC', fit: 92, proba: 65, fees: 14500, status: 'oral', program: 'International BBA (4 ans)', lieu: 'Nice / Lille', detail: 'Top BBA, tres selectif apres admissibilite', accred: 'AACSB EQUIS AMBA', rank: '#1 BBA / #14 FT' },
  { name: 'Hotelschool TH', fit: 91, proba: 60, fees: 9500, status: 'oral', program: 'BA Hotel Mgmt (4 ans)', lieu: 'La Haye / Amsterdam', detail: 'Selection Day exigeant (essay+interview+tests)', accred: 'QS #7 Hospitality', rank: '#7 monde hotellerie' },
  { name: 'emlyon', fit: 88, proba: 60, fees: 14000, status: 'oral', program: 'Global BBA (4 ans)', lieu: 'Lyon / Paris', detail: 'Epreuve signature unique, forte concurrence', accred: 'AACSB EQUIS AMBA', rank: '#2 BBA / #12 FT' },
  { name: 'SKEMA', fit: 87, proba: 70, fees: 13000, status: 'oral', program: 'Global BBA (4 ans)', lieu: 'Sophia-Antipolis / Lille', detail: 'Luxury & Fashion = match parfait profil Paola', accred: 'AACSB EQUIS AMBA', rank: 'Top 4 BBA / #18 FT' },
  { name: 'IESEG', fit: 82, proba: 60, fees: 11500, status: 'oral', program: 'PGE Bac+5', lieu: 'Lille / Paris La Defense', detail: '#1 PGE post-bac, format 45min exigeant', accred: 'AACSB EQUIS AMBA', rank: '#1 PGE / #33 FT' },
  { name: 'ESSCA', fit: 72, proba: 65, fees: 10500, status: 'oral', program: 'PGE Bac+5', lieu: 'Angers / Paris / Budapest', detail: 'Entretien collaboratif a 8 = part d\'aleatoire', accred: 'AACSB EQUIS AMBA', rank: '#2 PGE post-bac' },
  { name: 'NEOMA', fit: 71, proba: 75, fees: 12000, status: 'oral', program: 'Global BBA / CESEM', lieu: 'Reims / Paris / Rouen', detail: 'Moins selectif, profil intl de Paola = atout', accred: 'AACSB EQUIS AMBA', rank: 'Top 5 BBA / #30 FT' },
  { name: 'GEM', fit: 70, proba: 65, fees: 12500, status: 'oral', program: 'International BBA (4 ans)', lieu: 'Grenoble / Paris', detail: 'Textes anglais a preparer = risque si mal prepares', accred: 'AACSB EQUIS AMBA', rank: 'Top 5 BBA / #20 FT' },
  { name: 'KEDGE', fit: 68, proba: 75, fees: 11500, status: 'oral', program: 'EBP + IBBA (4 ans)', lieu: 'Bordeaux / Marseille', detail: 'Double admissibilite, format classique', accred: 'AACSB EQUIS AMBA', rank: 'Top 7 BBA' },
  { name: 'EM Normandie', fit: 66, proba: 75, fees: 11000, status: 'oral', program: 'PGE Bac+5', lieu: 'Caen / Paris / Dubai', detail: 'PGE moins selectif, campus Dubai = connexion Paola', accred: 'AACSB EQUIS', rank: 'Top 5 PGE post-bac' },
  { name: 'ESDES', fit: 62, proba: 80, fees: 9000, status: 'oral', program: 'PGE Bac+5', lieu: 'Lyon', detail: 'Moins selectif, themes donnes en avance', accred: 'AACSB EFMD', rank: '~#8 PGE post-bac' },
  { name: 'Inst. Lyfe', fit: 90, proba: 85, fees: 11000, status: 'attente', program: 'Bachelor Hospitality (4 ans)', lieu: 'Ecully (Lyon)', detail: 'Taux >80%, oral+ecrits passes, profil parfait', accred: 'Reconnu Etat', rank: '#1 hotellerie France' },
  { name: 'Dauphine-PSL', fit: 72, proba: 20, fees: 3700, status: 'attente', program: 'Licence Sciences des Org.', lieu: 'Paris / Madrid / Londres', detail: 'Tres selectif, dossier seul, pas d\'oral', accred: 'Universite publique', rank: 'Top 3 univ FR (PSL #24)' },
  { name: 'Excelia', fit: 64, proba: 70, fees: 7000, status: 'attente', program: 'PGE + Bachelor', lieu: 'La Rochelle / Paris', detail: 'Dossier retenu + oral passe, mid-selectivite', accred: 'AACSB EPAS', rank: '#4 PGE post-bac' },
  { name: 'ISG Paris', fit: 48, proba: 75, fees: 8000, status: 'attente', program: 'PGE Bac+5', lieu: 'Paris 16e', detail: 'Ecole accessible, oral passe', accred: 'AACSB', rank: '~#12 PGE post-bac' },
  { name: 'Lyon 3', fit: 38, proba: 95, fees: 700, status: 'attente', program: 'Licence Gestion', lieu: 'Lyon', detail: 'Filet garanti >80%', accred: 'AACSB (iaelyon)', rank: 'Filet garanti' },
  { name: 'EGC Lille', fit: 25, proba: 95, fees: 3000, status: 'attente', program: 'Bachelor Commerce', lieu: 'Lille', detail: 'Filet regional CCI', accred: 'CCI', rank: 'Filet regional' },
  { name: 'ESSEC', fit: 85, proba: 0, fees: 17400, status: 'refusee', program: 'Global BBA', lieu: 'Cergy / Singapour', detail: 'Non admissible', accred: 'AACSB EQUIS AMBA', rank: '#1 France' },
  { name: 'ESCP', fit: 80, proba: 0, fees: 13000, status: 'refusee', program: 'BSc Management', lieu: 'Paris / Londres / Turin', detail: 'Non admissible', accred: 'AACSB EQUIS AMBA', rank: '#2 France' },
  { name: 'RSM Rotterdam', fit: 75, proba: 0, fees: 12500, status: 'refusee', program: 'BSc IBA', lieu: 'Rotterdam', detail: 'Rang 2229', accred: 'AACSB EQUIS', rank: '#3 Europe IBA' },
];

const colors = { admise: '#27ae60', oral: '#2980b9', attente: '#f39c12', refusee: '#e74c3c' };
const statusLabels = { admise: 'ADMISE', oral: 'Oral a venir', attente: 'Attente resultats', refusee: 'Non admissible' };
const statusBg = { admise: '#d4edda', oral: '#d6eaf8', attente: '#fff3cd', refusee: '#f8d7da' };

let visibleStatus = new Set(['admise', 'oral', 'attente', 'refusee']);
let currentFilter = 'all';
let selectedSchool = null;
let hoverSchool = null;

const canvas = document.getElementById('chart');
const ctx = canvas.getContext('2d');
const miniTip = document.getElementById('miniTip');
const detailCard = document.getElementById('detailCard');
const dcContent = document.getElementById('dcContent');

const PAD = { top: 50, right: 50, bottom: 55, left: 60 };
let W, H, plotW, plotH, dpr = window.devicePixelRatio || 1;

function resize() {
  const rect = canvas.parentElement.getBoundingClientRect();
  W = rect.width - 48;
  H = Math.min(560, Math.max(420, W * 0.55));
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  plotW = W - PAD.left - PAD.right;
  plotH = H - PAD.top - PAD.bottom;
}

function xPos(proba) { return PAD.left + (proba / 100) * plotW; }
function yPos(fit) { return PAD.top + ((100 - fit) / 80) * plotH; } // Y axis 20-100
function rad(fees) { return Math.max(10, Math.min(30, 6 + Math.sqrt(fees / 400) * 2.5)); }

function isVisible(s) {
  if (!visibleStatus.has(s.status)) return false;
  if (currentFilter === 'top') return s.fit > 80;
  if (currentFilter === 'realistic') return s.proba > 50;
  if (currentFilter === 'ideal') return s.fit > 65 && s.proba > 60;
  return true;
}

function draw() {
  resize();
  ctx.clearRect(0, 0, W, H);

  // Quadrant fills
  const q70x = xPos(60), q70y = yPos(75);
  ctx.fillStyle = 'rgba(39,174,96,0.05)';
  ctx.fillRect(q70x, PAD.top, W - PAD.right - q70x, q70y - PAD.top);
  ctx.fillStyle = 'rgba(231,76,60,0.03)';
  ctx.fillRect(PAD.left, PAD.top, q70x - PAD.left, q70y - PAD.top);
  ctx.fillStyle = 'rgba(243,156,18,0.03)';
  ctx.fillRect(q70x, q70y, W - PAD.right - q70x, H - PAD.bottom - q70y);

  // Grid
  ctx.strokeStyle = '#eef0f4';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 100; i += 10) {
    if (i % 25 === 0) { ctx.strokeStyle = '#dde1e8'; } else { ctx.strokeStyle = '#f2f4f7'; }
    ctx.beginPath(); ctx.moveTo(xPos(i), PAD.top); ctx.lineTo(xPos(i), H - PAD.bottom); ctx.stroke();
  }
  for (let i = 20; i <= 100; i += 10) {
    if (i % 25 === 0) { ctx.strokeStyle = '#dde1e8'; } else { ctx.strokeStyle = '#f2f4f7'; }
    ctx.beginPath(); ctx.moveTo(PAD.left, yPos(i)); ctx.lineTo(W - PAD.right, yPos(i)); ctx.stroke();
  }

  // Axis ticks
  ctx.fillStyle = '#999';
  ctx.font = '10px Segoe UI, system-ui, sans-serif';
  ctx.textAlign = 'center';
  for (let i = 0; i <= 100; i += 25) {
    ctx.fillText(i + '%', xPos(i), H - PAD.bottom + 16);
  }
  ctx.textAlign = 'right';
  for (let i = 20; i <= 100; i += 20) {
    ctx.fillText(i, PAD.left - 8, yPos(i) + 4);
  }

  // Axis titles
  ctx.fillStyle = '#1a2e5a';
  ctx.font = 'bold 12px Segoe UI, system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('Chances de succes (%)', PAD.left + plotW / 2, H - 8);
  ctx.save();
  ctx.translate(14, PAD.top + plotH / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.fillText('Fit Paola (adequation profil)', 0, 0);
  ctx.restore();

  // Quadrant labels
  ctx.font = 'bold 13px Segoe UI, system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(39,174,96,0.12)';
  ctx.fillText('ZONE IDEALE', xPos(80), yPos(92));
  ctx.fillStyle = 'rgba(231,76,60,0.08)';
  ctx.fillText('AMBITIEUX', xPos(15), yPos(92));
  ctx.fillStyle = 'rgba(243,156,18,0.1)';
  ctx.fillText('FILET DE SECURITE', xPos(82), yPos(32));

  // Draw bubbles
  const drawOrder = ['refusee', 'attente', 'oral', 'admise'];
  const labelPositions = []; // collision avoidance

  for (const st of drawOrder) {
    schools.filter(s => s.status === st).forEach(s => {
      const vis = isVisible(s);
      const cx = xPos(s.proba), cy = yPos(s.fit), r = rad(s.fees);
      const isHov = hoverSchool === s;
      const isSel = selectedSchool === s;
      const alpha = vis ? (isHov || isSel ? 1 : 0.85) : 0.12;

      ctx.globalAlpha = alpha;

      if (isSel) { ctx.shadowColor = colors[s.status]; ctx.shadowBlur = 16; }

      ctx.beginPath();
      ctx.arc(cx, cy, isHov ? r + 3 : r, 0, Math.PI * 2);
      ctx.fillStyle = statusBg[s.status];
      ctx.fill();
      ctx.strokeStyle = colors[s.status];
      ctx.lineWidth = isSel ? 3.5 : isHov ? 3 : 2;
      ctx.stroke();
      ctx.shadowBlur = 0;

      // Price inside bubble
      if (vis) {
        ctx.fillStyle = '#555';
        ctx.font = '9px Segoe UI, system-ui, sans-serif';
        ctx.textAlign = 'center';
        const feeLabel = s.fees >= 10000 ? (s.fees/1000).toFixed(1)+'k' : s.fees < 1000 ? s.fees+'' : (s.fees/1000).toFixed(0)+'k';
        ctx.fillText(feeLabel, cx, cy + 3);
      }

      ctx.globalAlpha = 1;
    });
  }

  // Draw labels with collision avoidance (separate pass)
  const labels = [];
  for (const st of drawOrder) {
    schools.filter(s => s.status === st && isVisible(s)).forEach(s => {
      const cx = xPos(s.proba), cy = yPos(s.fit), r = rad(s.fees);
      const shortName = s.name.replace('Hotelschool TH', 'HTH').replace('Inst. Lyfe', 'Lyfe').replace('EM Normandie', 'EM Norm.').replace('Dauphine-PSL', 'Dauphine').replace('RSM Rotterdam', 'RSM').replace('Concordia JMSB', 'Concordia').replace('HEC Montreal', 'HEC Mtl').replace('EGC Lille', 'EGC').replace('ISG Paris', 'ISG');
      labels.push({ name: shortName, x: cx, y: cy + r + 13, r, color: colors[s.status] });
    });
  }

  // Resolve overlaps: shift labels that collide
  for (let i = 0; i < labels.length; i++) {
    for (let j = i + 1; j < labels.length; j++) {
      const a = labels[i], b = labels[j];
      const dx = Math.abs(a.x - b.x), dy = Math.abs(a.y - b.y);
      if (dx < 55 && dy < 12) {
        // Shift the lower-priority one
        if (a.y < b.y) { b.y += 13; } else { a.y += 13; }
      }
    }
  }

  // Render labels with leader lines if shifted far
  labels.forEach(l => {
    const origY = l.y;
    ctx.fillStyle = '#1a2e5a';
    ctx.font = 'bold 10px Segoe UI, system-ui, sans-serif';
    ctx.textAlign = 'center';
    // Background for readability
    const tw = ctx.measureText(l.name).width;
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.fillRect(l.x - tw/2 - 2, l.y - 9, tw + 4, 12);
    ctx.fillStyle = '#1a2e5a';
    ctx.fillText(l.name, l.x, l.y);
  });

  // Connection line for selected
  if (selectedSchool && isVisible(selectedSchool)) {
    const s = selectedSchool;
    const cx = xPos(s.proba), cy = yPos(s.fit);
    ctx.setLineDash([4, 4]);
    ctx.strokeStyle = colors[s.status];
    ctx.lineWidth = 1;
    ctx.globalAlpha = 0.4;
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx, H - PAD.bottom); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(PAD.left, cy); ctx.stroke();
    ctx.setLineDash([]);
    ctx.globalAlpha = 1;
  }
}

// Find school at position
function findAt(mx, my) {
  // Reverse order to pick top-drawn first
  const order = ['admise', 'oral', 'attente', 'refusee'];
  for (const st of order) {
    const group = schools.filter(s => s.status === st && isVisible(s));
    for (const s of group) {
      const cx = xPos(s.proba), cy = yPos(s.fit), r = rad(s.fees);
      if (Math.hypot(mx - cx, my - cy) < r + 5) return s;
    }
  }
  return null;
}

// Mini tooltip on hover
canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const s = findAt(mx, my);
  hoverSchool = s;
  draw();
  if (s && s !== selectedSchool) {
    miniTip.textContent = `${s.name} — ${s.lieu} — Fit ${s.fit} / Proba ${s.proba}%`;
    miniTip.style.opacity = 1;
    let tx = mx + 16, ty = my - 30;
    if (tx + 250 > W) tx = mx - 260;
    if (ty < 5) ty = my + 20;
    miniTip.style.left = tx + 'px';
    miniTip.style.top = ty + 'px';
    canvas.style.cursor = 'pointer';
  } else {
    miniTip.style.opacity = 0;
    canvas.style.cursor = s ? 'pointer' : 'default';
  }
});
canvas.addEventListener('mouseleave', () => { hoverSchool = null; miniTip.style.opacity = 0; draw(); });

// Detail card on click
canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const s = findAt(mx, my);
  if (s) {
    selectedSchool = s;
    miniTip.style.opacity = 0;
    showDetail(s, mx, my);
  } else {
    closeDetail();
  }
  draw();
});

function showDetail(s, mx, my) {
  const feeStr = s.fees.toLocaleString('fr-FR');
  dcContent.innerHTML = `
    <div class="dc-header">
      <div class="dc-dot" style="background:${colors[s.status]};"></div>
      <div class="dc-name">${s.name}</div>
      <span class="dc-status" style="background:${statusBg[s.status]};color:${colors[s.status]};">${statusLabels[s.status]}</span>
    </div>
    <div class="dc-grid">
      <div><div class="dc-label">Programme</div><div class="dc-val">${s.program}</div></div>
      <div><div class="dc-label">Lieu</div><div class="dc-val">${s.lieu}</div></div>
      <div><div class="dc-label">Frais / an</div><div class="dc-val">${feeStr} EUR</div></div>
      <div><div class="dc-label">Accreditations</div><div class="dc-val">${s.accred}</div></div>
      <div><div class="dc-label">Ranking</div><div class="dc-val">${s.rank}</div></div>
      <div><div class="dc-label">Fit Paola</div><div class="dc-val">${s.fit}/100</div>
        <div class="dc-bar"><div class="dc-bar-fill" style="width:${s.fit}%;background:${colors[s.status]};"></div></div>
      </div>
      <div><div class="dc-label">Chances</div><div class="dc-val">${s.proba}%</div>
        <div class="dc-bar"><div class="dc-bar-fill" style="width:${s.proba}%;background:${s.proba > 60 ? '#27ae60' : s.proba > 30 ? '#f39c12' : '#e74c3c'};"></div></div>
      </div>
    </div>
    <div class="dc-detail">${s.detail}</div>
  `;
  detailCard.classList.add('visible');
  // Position card
  let left = mx + 20;
  let top = my - 40;
  if (left + 310 > W) left = mx - 320;
  if (top < 10) top = 10;
  if (top + 280 > H) top = H - 280;
  detailCard.style.left = left + 'px';
  detailCard.style.top = top + 'px';
}

function closeDetail() {
  selectedSchool = null;
  detailCard.classList.remove('visible');
  draw();
}

// Legend toggle
function toggleStatus(status, el) {
  if (visibleStatus.has(status)) {
    visibleStatus.delete(status);
    el.classList.remove('active');
    el.classList.add('dimmed');
  } else {
    visibleStatus.add(status);
    el.classList.add('active');
    el.classList.remove('dimmed');
  }
  closeDetail();
  draw();
}

// Filter buttons
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  closeDetail();
  draw();
}

draw();
window.addEventListener('resize', () => { closeDetail(); draw(); });
</script>
</body>
